<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body style="font-family:system-ui;padding:2rem;background:#f5f5f3;">
  <h2 style="margin-bottom:1rem;">Click each button to download the icons</h2>
  <p style="color:#666;font-size:14px;margin-bottom:1.5rem;">Download both files and place them in the same folder as index.html</p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <button onclick="generate(192)" style="padding:10px 20px;font-size:14px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;">Download icon-192.png</button>
    <button onclick="generate(512)" style="padding:10px 20px;font-size:14px;cursor:pointer;border-radius:8px;border:1px solid #ccc;background:#fff;">Download icon-512.png</button>
  </div>
  <canvas id="c" style="display:none;"></canvas>
  <script>
    function generate(size) {
      const canvas = document.getElementById('c');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#185fa5';
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, size * 0.18);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${size * 0.42}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('%', size / 2, size * 0.44);

      ctx.font = `${size * 0.13}px system-ui`;
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fillText('PRICING', size / 2, size * 0.78);

      const a = document.createElement('a');
      a.download = `icon-${size}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
